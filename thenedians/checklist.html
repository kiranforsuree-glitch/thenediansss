<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Checklist Generator | The Nedians</title>
  <meta name="description" content="Generate a personalised document checklist for your Italian university application and student visa, based on your program level, city and nationality.">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="page-header plain">
    <div class="container">
      <div class="breadcrumb"><a href="index.html">Home</a><i class="fa-solid fa-chevron-right"></i><span>Document Checklist</span></div>
      <h1>Document Checklist Generator</h1>
      <p>Tell us about your application and we'll build a personalised, downloadable checklist of everything you need.</p>
    </div>
  </header>

  <section class="section">
    <div class="container" style="max-width:820px">
      <div class="card" style="padding:30px;margin-bottom:30px">
        <div class="form-row">
          <div class="form-group"><label>Study Level</label><select class="input" id="clLevel"><option>Bachelor's</option><option>Master's</option><option>PhD</option><option>Foundation</option></select></div>
          <div class="form-group"><label>Destination City</label><select class="input" id="clCity"></select></div>
        </div>
        <div class="form-group" style="margin-bottom:0"><label>Nationality</label><input class="input" id="clNat" placeholder="e.g. Pakistani"></div>
      </div>

      <div class="flex between center-y mb-3 wrap" style="gap:12px">
        <div><h2 class="section-title" style="font-size:1.5rem;margin-bottom:4px">Your Checklist</h2><p id="clProgress" style="font-size:.9rem"></p></div>
        <button class="btn btn-primary" id="clDownload"><i class="fa-solid fa-download"></i> Download Checklist</button>
      </div>
      <div class="checklist" id="clList"></div>
    </div>
  </section>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pages.js"></script>
  <script>renderChecklist();</script>
</body>
</html>
