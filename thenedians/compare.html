<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compare Italian Universities Side by Side | The Nedians</title>
  <meta name="description" content="Compare up to 3 Italian universities side-by-side: tuition, ranking, programs, language, deadlines and scholarships.">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="page-header plain">
    <div class="container">
      <div class="breadcrumb"><a href="index.html">Home</a><i class="fa-solid fa-chevron-right"></i><span>Compare</span></div>
      <h1>Compare Universities</h1>
      <p>Select 2–3 universities to compare side by side and make a confident, informed choice.</p>
    </div>
  </header>

  <section class="section">
    <div class="container">
      <div class="card" style="padding:24px;margin-bottom:30px">
        <h3 style="font-size:1.1rem;margin-bottom:14px"><i class="fa-solid fa-scale-balanced" style="color:var(--gold)"></i> Select universities (max 3)</h3>
        <div class="choice-grid" id="compareSelect" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr))"></div>
      </div>
      <div id="compareResult"></div>
    </div>
  </section>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pages.js"></script>
  <script>renderCompare();</script>
</body>
</html>
