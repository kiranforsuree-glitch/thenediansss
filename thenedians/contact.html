<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | The Nedians</title>
  <meta name="description" content="Get in touch with The Nedians. Visit our Milan office, call, WhatsApp or email our Italy study specialists.">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="page-header plain">
    <div class="container">
      <div class="breadcrumb"><a href="index.html">Home</a><i class="fa-solid fa-chevron-right"></i><span>Contact</span></div>
      <h1>Get in Touch</h1>
      <p>Have a question? Our team is here to help you take the first step towards studying in Italy.</p>
    </div>
  </header>

  <section class="section">
    <div class="container" style="display:grid;grid-template-columns:1fr 1.2fr;gap:40px;align-items:start" id="contactLayout">
      <div>
        <span class="eyebrow">Contact Details</span>
        <h2 class="section-title" style="font-size:1.8rem">We'd Love to Hear From You</h2>
        <div id="contactInfo" class="mt-3"></div>
        <iframe class="map-embed mt-3" loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="https://maps.google.com/maps?q=Milano,Italy&z=12&output=embed" title="The Nedians Milan office"></iframe>
      </div>
      <div class="card" style="padding:32px">
        <h3 style="font-size:1.3rem;margin-bottom:6px">Send Us a Message</h3>
        <p class="mb-3" style="font-size:.92rem">We typically reply within one business day.</p>
        <form id="contactForm" novalidate>
          <div class="form-row">
            <div class="form-group"><label>Full Name <span class="req">*</span></label><input class="input" name="name" required><div class="field-error"><i class="fa-solid fa-circle-exclamation"></i> Required.</div></div>
            <div class="form-group"><label>Email <span class="req">*</span></label><input class="input" name="email" type="email" required><div class="field-error"><i class="fa-solid fa-circle-exclamation"></i> Valid email required.</div></div>
          </div>
          <div class="form-group"><label>Subject <span class="req">*</span></label><input class="input" name="subject" required><div class="field-error"><i class="fa-solid fa-circle-exclamation"></i> Required.</div></div>
          <div class="form-group"><label>Message <span class="req">*</span></label><textarea class="textarea" name="message" required></textarea><div class="field-error"><i class="fa-solid fa-circle-exclamation"></i> Please write a message.</div></div>
          <button class="btn btn-primary btn-block" type="submit"><i class="fa-solid fa-paper-plane"></i> Send Message</button>
        </form>
      </div>
    </div>
  </section>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pages.js"></script>
  <script>renderContact();</script>
</body>
</html>
